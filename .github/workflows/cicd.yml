name: CI/CD Echo Network Debugger

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  BACKEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/echo-debugger-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/echo-debugger-frontend
  K8S_NAMESPACE: network-debugger
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-push:
    name: Build & Push Images to ACR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: set_tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag (dari job sebelumnya)
        id: set_tag
        run: echo "tag=${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_OUTPUT

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Login ke Azure menggunakan Service Principal
        run: |
          az login \
            --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"

          az account list --output table
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Set AKS context (get kubeconfig)
        run: |
          az aks get-credentials \
            --resource-group "${{ env.AKS_RESOURCE_GROUP }}" \
            --name "${{ env.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Update Backend Image di AKS
        run: |
          kubectl set image deployment/backend-deployment \
            backend=${{ env.BACKEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Update Frontend Image di AKS
        run: |
          kubectl set image deployment/frontend-deployment \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ steps.set_tag.outputs.tag }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Tunggu Backend Rollout Selesai
        run: |
          kubectl rollout status deployment/backend-deployment \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Tunggu Frontend Rollout Selesai
        run: |
          kubectl rollout status deployment/frontend-deployment \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=120s

      - name: Verifikasi Pod Running
        run: |
          echo "=== Status Pod ==="
          kubectl get pods --namespace ${{ env.K8S_NAMESPACE }} -l app=echo-backend
          kubectl get pods --namespace ${{ env.K8S_NAMESPACE }} -l app=echo-frontend
          echo "=== Image yang aktif ==="
          kubectl get deployment backend-deployment \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            --namespace ${{ env.K8S_NAMESPACE }}
          echo ""
          kubectl get deployment frontend-deployment \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Tampilkan Public IP Frontend
        run: |
          echo "=== External IP ==="
          kubectl get svc frontend-service --namespace ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
