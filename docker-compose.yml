services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - POD_NAME=local-backend
      - POD_NAMESPACE=local
      - NODE_NAME=local-machine
    restart: unless-stopped
    networks:
      app-network:
        aliases:
          - backend-service   # Allows nginx to resolve "backend-service" hostname

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
